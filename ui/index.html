<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CodeMap</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div id="app">
    <aside id="panel">
      <header class="brand">
        <span class="logo">◈</span>
        <div>
          <h1>CodeMap</h1>
          <p id="root-path" class="muted"></p>
        </div>
      </header>

      <div class="search">
        <input id="search" type="text" placeholder="Search files… (e.g. auth.ts)" autocomplete="off" spellcheck="false" />
        <div id="search-results"></div>
      </div>

      <div class="stats">
        <div class="stat"><span id="stat-nodes" class="value">0</span><span class="label">nodes</span></div>
        <div class="stat"><span id="stat-edges" class="value">0</span><span class="label">edges</span></div>
      </div>

      <div class="tabs">
        <button class="tab active" data-tab="filters">Filters</button>
        <button class="tab" data-tab="insights">Insights</button>
        <button class="tab" data-tab="history">History</button>
      </div>
      <section id="filters" class="filters pane"></section>
      <section id="insights" class="pane" hidden></section>
      <section id="history" class="pane" hidden></section>

      <footer class="hint muted">
        drag to pan · scroll to zoom · double-click a node to focus · drag a node to move it
      </footer>
    </aside>

    <main id="canvas-wrap">
      <div id="stage"></div>

      <div id="toolbar">
        <button id="zoom-in" title="Zoom in">+</button>
        <button id="zoom-out" title="Zoom out">−</button>
        <button id="fit" title="Fit to screen">⤢</button>
        <button id="group" title="Group by folder (toggle)">▣</button>
        <button id="cycles" title="Highlight dependency cycles">◎</button>
        <button id="relayout" title="Re-run layout">↻</button>
      </div>

      <canvas id="minimap" title="Minimap — click to jump"></canvas>
      <div id="legend" class="legend-overlay"></div>
    </main>

    <section id="sidebar"></section>
  </div>

  <script src="/app.js"></script>
</body>
</html>

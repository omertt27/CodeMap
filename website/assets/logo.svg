<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" width="480" height="120">
  <defs>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#a371f7"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e6edf3"/>
      <stop offset="100%" stop-color="#a8b8cc"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="480" height="120" rx="14" fill="#0b0f14"/>

  <!-- Subtle radial glow behind the icon -->
  <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.08"/>
    <stop offset="100%" stop-color="#0b0f14" stop-opacity="0"/>
  </radialGradient>
  <ellipse cx="60" cy="60" rx="58" ry="58" fill="url(#bgGlow)"/>

  <!-- ── Graph icon ── -->
  <!-- Edges (draw first, behind nodes) -->
  <!-- center → top-right -->
  <line x1="60" y1="60" x2="91" y2="33" stroke="#58a6ff" stroke-width="1.5" stroke-opacity="0.5"/>
  <!-- center → right -->
  <line x1="60" y1="60" x2="97" y2="65" stroke="#58a6ff" stroke-width="1.5" stroke-opacity="0.5"/>
  <!-- center → bottom -->
  <line x1="60" y1="60" x2="60" y2="93" stroke="#a371f7" stroke-width="1.5" stroke-opacity="0.5"/>
  <!-- center → top-left -->
  <line x1="60" y1="60" x2="29" y2="37" stroke="#58a6ff" stroke-width="1.5" stroke-opacity="0.5"/>
  <!-- center → bottom-left -->
  <line x1="60" y1="60" x2="27" y2="80" stroke="#a371f7" stroke-width="1.5" stroke-opacity="0.5"/>
  <!-- top-right → right -->
  <line x1="91" y1="33" x2="97" y2="65" stroke="#58a6ff" stroke-width="1" stroke-opacity="0.3"/>
  <!-- top-left → top-right -->
  <line x1="29" y1="37" x2="91" y2="33" stroke="#58a6ff" stroke-width="1" stroke-opacity="0.25"/>
  <!-- bottom-left → bottom -->
  <line x1="27" y1="80" x2="60" y2="93" stroke="#a371f7" stroke-width="1" stroke-opacity="0.3"/>

  <!-- Satellite nodes -->
  <!-- top-left -->
  <circle cx="29" cy="37" r="5.5" fill="#0b0f14" stroke="#58a6ff" stroke-width="1.5" filter="url(#glow)"/>
  <!-- top-right -->
  <circle cx="91" cy="33" r="7" fill="#0b0f14" stroke="#58a6ff" stroke-width="1.8" filter="url(#glow)"/>
  <!-- right -->
  <circle cx="97" cy="65" r="5" fill="#0b0f14" stroke="#a371f7" stroke-width="1.5" filter="url(#glow)"/>
  <!-- bottom -->
  <circle cx="60" cy="93" r="5" fill="#0b0f14" stroke="#a371f7" stroke-width="1.5" filter="url(#glow)"/>
  <!-- bottom-left -->
  <circle cx="27" cy="80" r="4.5" fill="#0b0f14" stroke="#a371f7" stroke-width="1.5" filter="url(#glow)"/>

  <!-- Center node (largest — the hub) -->
  <circle cx="60" cy="60" r="11" fill="url(#nodeGrad)" filter="url(#softglow)"/>
  <!-- Inner diamond mark -->
  <polygon points="60,52 67,60 60,68 53,60" fill="#0b0f14" fill-opacity="0.55"/>

  <!-- ── Wordmark ── -->
  <text x="130" y="52"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
    font-size="34" font-weight="800" letter-spacing="-0.5"
    fill="url(#textGrad)">CodeMap</text>

  <!-- Tagline -->
  <text x="131" y="76"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
    font-size="13.5" font-weight="400" letter-spacing="0.1"
    fill="#8b949e">Google Maps for codebases</text>

  <!-- Thin separator line between wordmark and tagline (optional accent) -->
  <line x1="131" y1="81" x2="375" y2="81" stroke="#222b36" stroke-width="1"/>

  <!-- Bottom badges -->
  <text x="131" y="98"
    font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
    font-size="10.5" fill="#58a6ff" letter-spacing="0.3">npm install -g @omertt27/codemap</text>
</svg>

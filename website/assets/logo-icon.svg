<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#a371f7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="120" height="120" rx="24" fill="#0b0f14"/>

  <!-- Radial glow -->
  <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.1"/>
    <stop offset="100%" stop-color="#0b0f14" stop-opacity="0"/>
  </radialGradient>
  <circle cx="60" cy="60" r="55" fill="url(#bgGlow)"/>

  <!-- Edges -->
  <line x1="60" y1="60" x2="89" y2="30" stroke="#58a6ff" stroke-width="2" stroke-opacity="0.5"/>
  <line x1="60" y1="60" x2="98" y2="66" stroke="#58a6ff" stroke-width="2" stroke-opacity="0.5"/>
  <line x1="60" y1="60" x2="60" y2="98" stroke="#a371f7" stroke-width="2" stroke-opacity="0.5"/>
  <line x1="60" y1="60" x2="22" y2="38" stroke="#58a6ff" stroke-width="2" stroke-opacity="0.5"/>
  <line x1="60" y1="60" x2="20" y2="82" stroke="#a371f7" stroke-width="2" stroke-opacity="0.5"/>
  <line x1="89" y1="30" x2="98" y2="66" stroke="#58a6ff" stroke-width="1.2" stroke-opacity="0.3"/>
  <line x1="22" y1="38" x2="89" y2="30" stroke="#58a6ff" stroke-width="1.2" stroke-opacity="0.25"/>
  <line x1="20" y1="82" x2="60" y2="98" stroke="#a371f7" stroke-width="1.2" stroke-opacity="0.3"/>

  <!-- Satellite nodes -->
  <circle cx="22" cy="38" r="7" fill="#0b0f14" stroke="#58a6ff" stroke-width="2" filter="url(#glow)"/>
  <circle cx="89" cy="30" r="9" fill="#0b0f14" stroke="#58a6ff" stroke-width="2.2" filter="url(#glow)"/>
  <circle cx="98" cy="66" r="6.5" fill="#0b0f14" stroke="#a371f7" stroke-width="2" filter="url(#glow)"/>
  <circle cx="60" cy="98" r="6.5" fill="#0b0f14" stroke="#a371f7" stroke-width="2" filter="url(#glow)"/>
  <circle cx="20" cy="82" r="6" fill="#0b0f14" stroke="#a371f7" stroke-width="2" filter="url(#glow)"/>

  <!-- Center hub node -->
  <circle cx="60" cy="60" r="15" fill="url(#nodeGrad)" filter="url(#softglow)"/>
  <!-- Inner diamond -->
  <polygon points="60,50 69,60 60,70 51,60" fill="#0b0f14" fill-opacity="0.5"/>
</svg>
